<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 217" width="192" height="217" role="img" aria-labelledby="title desc">
  <title id="title">Sector One Icon</title>
  <desc id="desc">A geometric Sector One icon forming an abstract S and number 1 using deep navy, dark teal, and orange.</desc>
  <defs>
    <linearGradient id="navyGradient" x1="22" y1="12" x2="150" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00213D"/>
      <stop offset="0.55" stop-color="#001B32"/>
      <stop offset="1" stop-color="#002C45"/>
    </linearGradient>
    <linearGradient id="tealGradient" x1="22" y1="117" x2="156" y2="203" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00787C"/>
      <stop offset="0.58" stop-color="#006972"/>
      <stop offset="1" stop-color="#005060"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="108" y1="29" x2="155" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF7A12"/>
      <stop offset="1" stop-color="#FF6500"/>
    </linearGradient>
  </defs>

  <!-- Upper S ribbon -->
  <path fill="url(#navyGradient)" d="
    M 104 12
    L 25 54
    C 23 55 22 58 22 61
    L 22 100
    L 112 150
    L 149 129
    L 55 77
    L 105 51
    L 104 12
    Z"/>

  <!-- Lower S ribbon -->
  <path fill="url(#tealGradient)" d="
    M 22 117
    L 22 156
    C 22 160 24 163 27 165
    L 96 202
    L 146 177
    C 152 174 155 169 155 162
    L 155 138
    C 154 134 152 131 149 129
    L 96 157
    L 22 117
    Z"/>

  <!-- Number one / orange accent -->
  <path fill="url(#orangeGradient)" d="
    M 155 29
    L 108 52
    L 130 65
    L 130 108
    L 155 122
    L 155 29
    Z"/>
</svg>
